# Local Postgres + the web app. `docker compose up` for a one-command dev stack.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: raddar
      POSTGRES_PASSWORD: raddar
      POSTGRES_DB: raddar
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raddar"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_BACKEND: postgres
      DATABASE_URL: postgresql+asyncpg://raddar:raddar@db:5432/raddar
      SESSION_SECRET: dev-compose-secret
    ports:
      - "8000:8000"

volumes:
  pgdata:
